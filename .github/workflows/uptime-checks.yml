name: Uptime Checks

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

env:
  BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}

jobs:
  uptime:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe critical public routes
        shell: bash
        run: |
          set -euo pipefail

          BASE="${BASE_URL:-https://golfdataviz.com}"
          PAYLOAD=""

          echo "Checking ${BASE}/"
          curl -fsS --max-time 20 "${BASE}/" >/dev/null

          echo "Checking ${BASE}/strokes-gained"
          curl -fsS --max-time 20 "${BASE}/strokes-gained" >/dev/null

          echo "Checking ${BASE}/strokes-gained/og"
          curl -fsS --max-time 20 "${BASE}/strokes-gained/og?d=${PAYLOAD}" >/dev/null

      - name: Notify Slack on failure
        if: ${{ failure() && secrets.UPTIME_ALERT_SLACK_WEBHOOK != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.UPTIME_ALERT_SLACK_WEBHOOK }}
        shell: bash
        run: |
          set -euo pipefail
          BASE="${BASE_URL:-https://golfdataviz.com}"
          MESSAGE="Uptime checks failed for ${BASE} in ${GITHUB_REPOSITORY}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          PAYLOAD=$(jq -n --arg text "${MESSAGE}" '{text: $text}')
          curl -fsS -X POST -H "Content-type: application/json" --data "${PAYLOAD}" "${SLACK_WEBHOOK_URL}"
