name: Production Smoke

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - name: Run production smoke tests
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEBSERVER: "true"
          PLAYWRIGHT_BASE_URL: ${{ vars.PRODUCTION_BASE_URL || 'https://golfdataviz.com' }}
        shell: bash
        run: npx playwright test --project=production-chromium --project=production-webkit

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Prod smoke failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '## Daily prod smoke test failed',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Commit:** ${context.sha.slice(0, 7)}`,
              '',
              'Check the workflow logs for details.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['bug', 'prod-smoke'],
            });
