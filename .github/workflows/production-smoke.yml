name: Production Smoke

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - name: Run production smoke tests
        env:
          CI: true
          PLAYWRIGHT_SKIP_WEBSERVER: "true"
          PLAYWRIGHT_BASE_URL: ${{ vars.PRODUCTION_BASE_URL || 'https://golfdataviz.com' }}
        shell: bash
        run: npx playwright test --project=production-chromium --project=production-webkit

      - name: Create or update GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);

            // Check for existing open prod-smoke issue to avoid duplicates
            const { data: existing } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'prod-smoke',
              per_page: 1,
            });

            if (existing.length > 0) {
              // Append a comment to the existing issue
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing[0].number,
                body: `Still failing — ${today}\n\n**Run:** ${runUrl}\n**Commit:** ${context.sha.slice(0, 7)}`,
              });
            } else {
              // Ensure the prod-smoke label exists
              try {
                await github.rest.issues.getLabel({ owner, repo, name: 'prod-smoke' });
              } catch {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: 'prod-smoke',
                  color: 'e11d48',
                  description: 'Daily production smoke test failure',
                });
              }

              await github.rest.issues.create({
                owner,
                repo,
                title: `Prod smoke failed — ${today}`,
                body: [
                  '## Daily prod smoke test failed',
                  '',
                  `**Run:** ${runUrl}`,
                  `**Commit:** ${context.sha.slice(0, 7)}`,
                  '',
                  'Check the workflow logs for details.',
                ].join('\n'),
                labels: ['prod-smoke'],
              });
            }
