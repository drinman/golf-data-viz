name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Start local Supabase
        run: npx supabase start
      - run: npm run test:db
      - name: Stop Supabase
        if: always()
        run: npx supabase stop

  e2e:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run build
      - name: Functional E2E tests
        run: npx playwright test --project=functional
        env:
          CI: true
          PLAYWRIGHT_USE_PROD_SERVER: true
      - name: Visual regression tests
        id: visual
        run: npx playwright test --project=visual
        continue-on-error: true
        env:
          CI: true
      - name: Auto-update visual baselines
        if: steps.visual.outcome == 'failure'
        run: |
          npx playwright test --project=visual --update-snapshots
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/visual-regression.spec.ts-snapshots/
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update visual regression baselines"
            git push
          fi
      - name: Upload Playwright visual diffs
        if: steps.visual.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-diffs
          if-no-files-found: ignore
          path: |
            test-results/**/*-actual.png
            test-results/**/*-diff.png
            test-results/**/error-context.md
