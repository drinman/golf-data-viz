name: Staging Smoke

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-smoke
  cancel-in-progress: true

jobs:
  staging-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      PLAYWRIGHT_SKIP_WEBSERVER: "true"
      PLAYWRIGHT_BASE_URL: https://staging.golfdataviz.com
      NEXT_PUBLIC_SUPABASE_URL: https://uxelgkeagzjnwmjspcda.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
      PLAYWRIGHT_E2E_EMAIL: ${{ secrets.STAGING_PLAYWRIGHT_E2E_EMAIL }}
      PLAYWRIGHT_E2E_PASSWORD: ${{ secrets.STAGING_PLAYWRIGHT_E2E_PASSWORD }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium webkit

      - name: Wait for staging deployment matching this commit
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: prj_JEOpUisLp4LxNSF0o1qvuxR2QJl1
          VERCEL_TEAM_ID: team_AusQ5gpKE0lhKnMzvHXNp29m
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          for attempt in {1..60}; do
            # Query Vercel for the latest production deployment on this project
            deploy=$(curl -sS \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_TEAM_ID}&target=production&limit=1" \
              | jq -r '.deployments[0] // empty')

            if [ -n "${deploy}" ]; then
              sha=$(echo "${deploy}" | jq -r '.meta.githubCommitSha // empty')
              state=$(echo "${deploy}" | jq -r '.readyState // empty')

              if [ "${sha}" = "${EXPECTED_SHA}" ] && [ "${state}" = "READY" ]; then
                echo "staging deploy ${sha:0:7} is READY"
                exit 0
              fi
              echo "attempt ${attempt}: latest deploy sha=${sha:0:7} state=${state} (want ${EXPECTED_SHA:0:7} READY)"
            else
              echo "attempt ${attempt}: no deployments found yet"
            fi
            sleep 10
          done
          echo "timed out waiting for staging deploy of ${EXPECTED_SHA:0:7}"
          exit 1

      - name: Run remote browser smoke
        shell: bash
        run: npx playwright test tests/e2e/production-smoke.spec.ts --project=production-chromium --project=production-webkit

      - name: Run OAuth claim handoff smoke
        shell: bash
        run: npx playwright test tests/e2e/oauth-claim-handoff.spec.ts --project=functional
